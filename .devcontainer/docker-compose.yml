services:
  devcontainer-macstab-chaos-testing:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GRADLE_VERSION: ${GRADLE_VERSION:-9.3.1}
        JAVA_VERSION: ${JAVA_VERSION:-25}
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    privileged: true
    networks:
      - redis-sentinel

  # Redis Master
  redis-master:
    image: redis:7.4
    command: >
      redis-server
      --appendonly yes
      --appendfilename "master.aof"
    ports:
      - "6379:6379"
    networks:
      - redis-sentinel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 1
  redis-replica-1:
    image: redis:7.4
    command: >
      redis-server
      --replicaof redis-master 6379
      --appendonly yes
      --appendfilename "replica1.aof"
    ports:
      - "6380:6379"
    networks:
      - redis-sentinel
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Redis Replica 2
  redis-replica-2:
    image: redis:7.4
    command: >
      redis-server
      --replicaof redis-master 6379
      --appendonly yes
      --appendfilename "replica2.aof"
    ports:
      - "6381:6379"
    networks:
      - redis-sentinel
    depends_on:
      redis-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Sentinel 1
  sentinel-1:
    image: redis:7.4
    command: >
      sh -c "
        MASTER_IP=$$(getent hosts redis-master | awk '{print $$1}') &&
        echo 'port 26379' > /tmp/sentinel.conf &&
        echo 'dir /tmp' >> /tmp/sentinel.conf &&
        echo \"sentinel monitor mymaster $$MASTER_IP 6379 2\" >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26379:26379"
    networks:
      - redis-sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy

  # Sentinel 2
  sentinel-2:
    image: redis:7.4
    command: >
      sh -c "
        MASTER_IP=$$(getent hosts redis-master | awk '{print $$1}') &&
        echo 'port 26379' > /tmp/sentinel.conf &&
        echo 'dir /tmp' >> /tmp/sentinel.conf &&
        echo \"sentinel monitor mymaster $$MASTER_IP 6379 2\" >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26380:26379"
    networks:
      - redis-sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy

  # Sentinel 3
  sentinel-3:
    image: redis:7.4
    command: >
      sh -c "
        MASTER_IP=$$(getent hosts redis-master | awk '{print $$1}') &&
        echo 'port 26379' > /tmp/sentinel.conf &&
        echo 'dir /tmp' >> /tmp/sentinel.conf &&
        echo \"sentinel monitor mymaster $$MASTER_IP 6379 2\" >> /tmp/sentinel.conf &&
        echo 'sentinel down-after-milliseconds mymaster 5000' >> /tmp/sentinel.conf &&
        echo 'sentinel parallel-syncs mymaster 1' >> /tmp/sentinel.conf &&
        echo 'sentinel failover-timeout mymaster 10000' >> /tmp/sentinel.conf &&
        redis-sentinel /tmp/sentinel.conf
      "
    ports:
      - "26381:26379"
    networks:
      - redis-sentinel
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy

networks:
  redis-sentinel:
    driver: bridge
